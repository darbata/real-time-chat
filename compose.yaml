services:

  conversations:
    build: ./conversations/.
    ports:
      - 8080:8080
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-southeast-2
      - DYNAMODB_HOST=dynamodb
      - DYNAMODB_PORT=8000
      - DYNAMODB_TABLE=Conversations
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example # matches postgres
    depends_on:
      dynamodb:
        condition: service_healthy
      postgres:
        condition: service_healthy

  chat:
    build: ./chat/.
    ports:
      - 8081:8080
    environment:
      - RABBITMQ_HOST=broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_STOMP_RELAY_PORT=61613
    depends_on:
      broker:
        condition: service_healthy
      broker-config-init:
        condition: service_completed_successfully

  dispatcher:
    build: ./dispatcher/.
    ports:
      - 8082:8080
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-southeast-2
      - RABBITMQ_HOST=broker
      - RABBITMQ_PORT=5672
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=example # matches postgres
      - DYNAMODB_HOST=dynamodb
      - DYNAMODB_PORT=8000
      - DYNAMODB_TABLE=Conversations
    depends_on:
      broker:
        condition: service_healthy
      broker-config-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy


  dynamodb:
    image: amazon/dynamodb-local:latest
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ "$(curl -s -o /dev/null -I -w ''%{http_code}'' http://localhost:8000)" == "400" ]; then exit 0; else exit 1; fi',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:18
    environment:
      - POSTGRES_PASSWORD=example 
    volumes:
      - ${PWD}/init/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U postgres -d postgres'"]
      interval: 10s
      timeout: 3s
      retries: 3

  broker:
    image: rabbitmq:4.3-rc-management # image has management ui
    volumes:
      - ${PWD}/init/rabbitmq/rabbitmq_enabled_plugins:/etc/rabbitmq/enabled_plugins
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker-config-init:
    image: curlimages/curl:8.10.1
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ${PWD}/init/rabbitmq/definitions.json:/definitions.json:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        curl -fsS -u guest:guest \
          -H "Content-Type: application/json" \
          -X POST \
          --data @/definitions.json \
          http://broker:15672/api/definitions
    restart: "no"
